openapi: 3.0.3
info:
  title: UnaHur Anti-Social Net API (MongoDB)
  description: API documentada para el MVP utilizando MongoDB, Mongoose y validaciones con Joi.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
tags:
  - name: Usuarios
  - name: Publicaciones
  - name: Comentarios
  - name: Etiquetas
  - name: Imágenes

paths:

  /users:
    post:
      tags: [Usuarios]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickName]
              properties:
                nickName:
                  type: string
                  minLength: 3
                  maxLength: 50
                  example: "diego_dev"
      responses:
        '201':
          description: Creado exitosamente
        '400':
          description: Error de validación o usuario duplicado (código 11000)
    get:
      tags: [Usuarios]
      summary: Obtener todos los usuarios
      responses:
        '200':
          description: Lista de usuarios
  
  /users/{nickName}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por nickName
      parameters:
        - name: nickName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario encontrado
        '404':
          description: Usuario no encontrado
    put:
      tags: [Usuarios]
      summary: Actualizar usuario
      parameters:
        - name: nickName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newNickName]
              properties:
                newNickName:
                  type: string
                  example: "diego_wollok"
      responses:
        '200':
          description: Usuario actualizado
    delete:
      tags: [Usuarios]
      summary: Eliminar usuario
      parameters:
        - name: nickName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario eliminado correctamente
        '404':
          description: Usuario no encontrado

  /posts:
    post:
      tags: [Publicaciones]
      summary: Crear publicación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description, user_nickName]
              properties:
                description:
                  type: string
                  minLength: 1
                  maxLength: 280
                  example: "Proyecto: Videojuego en pixel art estilo retro (Wollok Game) con magos elementales y enemigos/bosses."
                user_nickName:
                  type: string
                  minLength: 3
                  example: "diego_wollok"
                images:
                  type: array
                  items:
                    type: string
                    format: uri
                  example: ["https://miservidor.com/sprites_50x50.png"]
      responses:
        '201':
          description: Post creado
        '400':
          description: Error de validación
        '404':
          description: Usuario no existe
    get:
      tags: [Publicaciones]
      summary: Obtener publicaciones
      description: Devuelve las publicaciones con etiquetas pobladas y comentarios filtrados por antigüedad.
      responses:
        '200':
          description: Lista de publicaciones

  /posts/{id}:
    put:
      tags: [Publicaciones]
      summary: Actualizar descripción del post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description:
                  type: string
                  example: "Las imágenes de sprites se están ajustando a 50x50 px."
      responses:
        '200':
          description: Post actualizado
    delete:
      tags: [Publicaciones]
      summary: Eliminar publicación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post eliminado
        '404':
          description: Post no encontrado

  /posts/{id}/tags:
    post:
      tags: [Etiquetas]
      summary: Agregar etiqueta al post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "pixel-art"
      responses:
        '200':
          description: Etiqueta vinculada

  /posts/{id}/tags/{tagId}:
    delete:
      tags: [Etiquetas]
      summary: Eliminar etiqueta de un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID del post
        - name: tagId
          in: path
          required: true
          schema:
            type: string
          description: ID de la etiqueta
      responses:
        '200':
          description: Etiqueta removida del post exitosamente
        '404':
          description: Post no encontrado

  /posts/{id}/images:
    post:
      tags: [Imágenes]
      summary: Agregar imagen física al post (Upload)
      description: Sube una imagen al servidor (Multer) y guarda su ruta estática en el post.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Archivo físico de la imagen (JPG, PNG, etc.)
      responses:
        '200':
          description: Imagen subida y agregada con éxito
        '400':
          description: Se requiere subir un archivo de imagen válido
        '404':
          description: Post no encontrado
    delete:
      tags: [Imágenes]
      summary: Eliminar imagen incrustada
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  example: "http://localhost:3000/uploads/LogoUnahur_20260626134852631.png"
      responses:
        '200':
          description: Imagen eliminada

  /posts/comments:
    get:
      tags: [Comentarios]
      summary: Obtener todos los comentarios
      responses:
        '200':
          description: Lista de todos los comentarios

  /posts/comments/{id}:
    get:
      tags: [Comentarios]
      summary: Obtener un comentario por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comentario encontrado
        '404':
          description: Comentario no encontrado
    put:
      tags: [Comentarios]
      summary: Actualizar comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  example: "Este es el texto corregido del comentario."
      responses:
        '200':
          description: Comentario actualizado
        '404':
          description: Comentario no encontrado
    delete:
      tags: [Comentarios]
      summary: Eliminar comentario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Comentario eliminado
        '404':
          description: Comentario no encontrado

  /posts/{id}/comments:
    post:
      tags: [Comentarios]
      summary: Comentar publicación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, user_nickName]
              properties:
                text:
                  type: string
                  example: "¡Me encantan los diseños de los enemigos!"
                user_nickName:
                  type: string
                  example: "jugador_1"
      responses:
        '201':
          description: Comentario creado
        '404':
          description: Post o usuario no encontrado
    get:
      tags: [Comentarios]
      summary: Obtener comentarios de un post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de comentarios del post

  /tags:
    post:
      tags: [Etiquetas]
      summary: Crear etiqueta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "desarrollo web"
      responses:
        '201':
          description: Etiqueta creada exitosamente
        '400':
          description: Error de validación o etiqueta ya existente
    get:
      tags: [Etiquetas]
      summary: Obtener todas las etiquetas
      responses:
        '200':
          description: Lista de etiquetas
          
  /tags/{id}:
    get:
      tags: [Etiquetas]
      summary: Obtener etiqueta por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Etiqueta encontrada
        '404':
          description: Etiqueta no encontrada
    put:
      tags: [Etiquetas]
      summary: Actualizar etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "tecnología avanzada"
      responses:
        '200':
          description: Etiqueta actualizada
        '400':
          description: El nuevo nombre ya está en uso
        '404':
          description: Etiqueta no encontrada
    delete:
      tags: [Etiquetas]
      summary: Eliminar etiqueta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Etiqueta eliminada correctamente
        '404':
          description: Etiqueta no encontrada